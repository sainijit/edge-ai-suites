image:
  repository: intel/nvr-event-router
  tag: 1.2.0

replicaCount: 1

service:
  type: ClusterIP
  port: 7860

env:
  MODE: "ui"
  API_BASE_URL: "http://localhost:8000"
  EVENT_POLL_INTERVAL: "10"
  NVR_GENAI: ""
  no_proxy: ""

volume:
  name: localtime
  mountPath: /etc/localtime
  hostPath: /etc/localtime
  readOnly: true

