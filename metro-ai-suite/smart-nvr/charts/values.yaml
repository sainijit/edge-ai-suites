nvr-event-router-ui:
  image:
    repository: intel/nvr-event-router
    tag: 1.2.0
  env:
    MODE: "ui"
    API_BASE_URL: "http://nvr-event-router:8000"
    EVENT_POLL_INTERVAL: "3000"
    NVR_GENAI: "true"

mqtt-broker:
  image:
    repository: eclipse-mosquitto
    tag: 2.0
  env:
    MQTT_USER: "frigate"
    MQTT_PASSWORD: "mqtt"

redis:
  image:
    repository: redis
    tag: 7.0